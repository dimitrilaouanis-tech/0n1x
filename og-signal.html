<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<title>0n1x Signal — OG card 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0b0d11}
  /* EXACT OG canvas — screenshot this element at 1200x630 */
  .card{
    width:1200px;height:630px;position:relative;overflow:hidden;
    background:
      radial-gradient(90% 70% at 88% 4%, rgba(63,224,160,.07), transparent 58%),
      radial-gradient(70% 60% at 4% 96%, rgba(120,150,255,.05), transparent 55%),
      #010204;
    /* visible light border so the card never bleeds into dark-mode chat clients */
    border:1px solid rgba(242,245,244,.16);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:62px 68px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    -webkit-font-smoothing:antialiased;
  }
  /* hairline grid whisper — texture, not decoration */
  .card::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(242,245,244,.028) 1px,transparent 1px);
    background-size:100% 42px;
    mask-image:linear-gradient(to bottom,transparent,#000 30%,#000 70%,transparent);
  }
  .top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
  .brand{font-weight:700;letter-spacing:.22em;color:#fff;font-size:22px}
  .brand b{color:#3FE0A0}
  .edition{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#8A9691;text-align:right;line-height:1.9}

  .mid{position:relative;z-index:1;margin-top:-8px}
  .kick{
    display:inline-block;font-size:13px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
    color:#3FE0A0;margin-bottom:26px;
  }
  h1{
    font-family:'Source Serif 4',Georgia,serif;font-weight:600;
    font-size:82px;line-height:.98;letter-spacing:-.024em;color:#F2F5F4;
    font-variation-settings:'opsz' 60;max-width:17ch;
  }
  h1 em{font-style:italic;color:#3FE0A0}
  .rule{width:112px;height:3px;background:#3FE0A0;margin:34px 0 26px;position:relative;z-index:2;border-radius:2px}
  .dek{
    font-family:'Source Serif 4',Georgia,serif;font-size:24px;line-height:1.4;
    color:#C9D2CF;max-width:46ch;font-weight:400;
  }

  .bot{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
  .tape{font-size:14px;letter-spacing:.14em;color:#525B68}
  .tape b{color:#8A9691;font-weight:500}
  .stand{font-size:13px;letter-spacing:.1em;color:#8A9691;text-align:right;line-height:1.9}
  .stand .dot{color:#3FE0A0}
</style></head><body>
<div class="card" id="card">

  <div class="top">
    <div class="brand">0n<b>1</b>x</div>
    <div class="edition">Signal<br>Vol. 1 · Ed. 01</div>
  </div>

  <div class="mid">
    <span class="kick">Protocols · Payments · Models · Trust</span>
    <h1>The agentic web, <em>tracked</em>.</h1>
    <div class="rule"></div>
    <p class="dek">Source-linked news on the protocols, models and payment rails the agent economy actually runs on.</p>
  </div>

  <div class="bot">
    <div class="tape"><b>MCP</b> &nbsp;·&nbsp; <b>A2A</b> &nbsp;·&nbsp; <b>AP2</b> &nbsp;·&nbsp; <b>x402</b></div>
    <div class="stand"><span class="dot">●</span> Every item source-linked<br>Verify before you trust</div>
  </div>

</div>
</body></html>
