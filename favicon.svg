<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#010204"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#3FE0A0" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- 0n1x monogram, mono weight; the "1" carries the jade accent = the brand's signature -->
